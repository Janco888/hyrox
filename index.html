<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HYROX">
<meta name="theme-color" content="#0E1116">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<title>HYROX Build</title>
<style>
:root{
  --bg:#0E1116; --surface:#161B22; --surface2:#1E2630; --line:#2A333F;
  --text:#E9EDF2; --muted:#8A97A6; --dim:#5C6873;
  --accent:#C8FF3D; --amber:#FFC247; --teal:#34D6C8; --danger:#FF6B5E;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans)}
body{max-width:520px;margin:0 auto;min-height:100vh;padding-bottom:84px}
.hdr{position:sticky;top:0;z-index:20;background:rgba(14,17,22,.92);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);padding:calc(env(safe-area-inset-top) + 14px) 18px 12px}
.hdr .kick{font-family:var(--mono);font-size:10px;letter-spacing:.22em;color:var(--accent);text-transform:uppercase}
.hdr h1{margin:2px 0 0;font-size:20px;font-weight:800;letter-spacing:.02em}
.hdr .sub{font-size:12px;color:var(--muted);margin-top:2px}
.wrap{padding:16px 14px 8px}
.seg{display:flex;gap:6px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:4px;margin-bottom:14px}
.seg button{flex:1;border:0;background:transparent;color:var(--muted);font-family:var(--mono);font-size:12px;
  letter-spacing:.08em;padding:9px 4px;border-radius:9px;font-weight:600;text-transform:uppercase;transition:.15s}
.seg button.on{background:var(--accent);color:#0B0E12}
.daycard{background:var(--surface);border:1px solid var(--line);border-radius:14px;margin-bottom:10px;overflow:hidden}
.dayhead{display:flex;align-items:center;gap:12px;padding:14px 15px;cursor:pointer}
.dayhead .dn{font-weight:800;font-size:15px;letter-spacing:.01em}
.dayhead .df{font-size:11.5px;color:var(--muted);margin-top:1px}
.dot{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--dim);white-space:nowrap}
.dot.done{color:var(--accent)}
.rest .dn{color:var(--teal)}
.chev{color:var(--dim);transition:.2s;font-size:13px}
.open .chev{transform:rotate(90deg)}
.body{display:none;border-top:1px solid var(--line);padding:6px 12px 12px}
.open .body{display:block}
.sess{margin-top:12px}
.sesshead{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.sesshead .nm{font-size:13px;font-weight:700}
.sesshead .meta{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.05em}
.qflag{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.1em;color:#0B0E12;background:var(--amber);
  padding:2px 6px;border-radius:5px;text-transform:uppercase}
.chk{margin-left:auto;width:26px;height:26px;border-radius:8px;border:1.5px solid var(--line);background:var(--surface2);
  display:grid;place-items:center;cursor:pointer;color:transparent;font-size:15px;flex:none}
.chk.on{background:var(--accent);border-color:var(--accent);color:#0B0E12}
.ex{display:grid;grid-template-columns:1fr auto;gap:2px 10px;padding:8px 0;border-top:1px solid #20272F}
.ex:first-child{border-top:0}
.ex .exn{font-size:13px;font-weight:600}
.ex .sr{font-family:var(--mono);font-size:12px;color:var(--accent);text-align:right;white-space:nowrap}
.ex .ld{font-family:var(--mono);font-size:11.5px;color:var(--muted);grid-column:1/-1}
.ex .nt{font-size:11px;color:var(--dim);grid-column:1/-1;line-height:1.35}
.macros{display:flex;gap:7px;margin-bottom:14px}
.mc{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:10px 6px;text-align:center}
.mc .v{font-family:var(--mono);font-size:18px;font-weight:700}
.mc .l{font-size:9px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-top:2px}
.mc.k .v{color:var(--accent)} .mc.p .v{color:var(--teal)} .mc.f .v{color:var(--amber)} .mc.c .v{color:#9AB4FF}
.meal{background:var(--surface);border:1px solid var(--line);border-radius:13px;margin-bottom:9px;overflow:hidden}
.mhead{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer}
.mhead .tm{font-family:var(--mono);font-size:11px;color:var(--dim);width:42px;flex:none}
.mhead .mn{font-weight:700;font-size:13.5px}
.mhead .kc{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--accent)}
.mbody{display:none;border-top:1px solid var(--line);padding:4px 14px 10px 14px}
.meal.open .mbody{display:block}
.ing{display:flex;justify-content:space-between;gap:10px;padding:7px 0;border-top:1px solid #20272F;font-size:13px}
.ing:first-child{border-top:0}
.ing .am{font-family:var(--mono);font-size:12px;color:var(--muted);white-space:nowrap}
.note{font-size:11.5px;color:var(--dim);line-height:1.5;margin:2px 2px 16px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px}
.card h2{margin:0 0 12px;font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);font-weight:700}
.field{margin-bottom:11px}
.field label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.field input,.field textarea{width:100%;background:var(--surface2);border:1px solid var(--line);border-radius:10px;
  color:var(--text);font-size:15px;font-family:var(--sans);padding:11px 12px;outline:none}
.field input[type=number]{font-family:var(--mono)}
.field input:focus,.field textarea:focus{border-color:var(--accent)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.save{width:100%;background:var(--accent);color:#0B0E12;border:0;border-radius:11px;padding:14px;font-size:15px;
  font-weight:800;letter-spacing:.02em;cursor:pointer;margin-top:4px}
.save:active{transform:scale(.99)}
.chart{width:100%;height:150px;display:block}
.hist{font-size:13px}
.hrow{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;padding:10px 0;border-top:1px solid #20272F}
.hrow:first-child{border-top:0}
.hrow .hd{font-family:var(--mono);font-size:11px;color:var(--dim)}
.hrow .hw{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--accent)}
.hrow .hn{font-size:11.5px;color:var(--muted);grid-column:2/4;line-height:1.3}
.del{color:var(--dim);background:0;border:0;font-size:16px;cursor:pointer}
.empty{color:var(--dim);font-size:13px;text-align:center;padding:24px 10px;line-height:1.5}
.nav{position:fixed;bottom:0;left:0;right:0;max-width:520px;margin:0 auto;display:flex;
  background:rgba(20,25,32,.94);backdrop-filter:blur(14px);border-top:1px solid var(--line);
  padding:8px 0 calc(env(safe-area-inset-bottom) + 8px);z-index:30}
.nav button{flex:1;background:0;border:0;color:var(--dim);display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px}
.nav button .ic{font-size:19px;line-height:1}
.nav button .tx{font-size:10px;letter-spacing:.08em;text-transform:uppercase;font-weight:600}
.nav button.on{color:var(--accent)}
.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);background:var(--accent);
  color:#0B0E12;font-weight:700;font-size:13px;padding:11px 20px;border-radius:30px;opacity:0;transition:.25s;z-index:40;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.legend{display:flex;gap:14px;font-size:10.5px;color:var(--muted);font-family:var(--mono);margin-top:6px;justify-content:center}
.legend i{display:inline-block;width:14px;height:2px;vertical-align:middle;margin-right:4px}

.sesshead .ctl{margin-left:auto;display:flex;gap:8px;align-items:center}
.ctl .chk{margin-left:0}
.eflag{font-family:var(--mono);font-size:9px;color:var(--amber);border:1px solid var(--amber);border-radius:5px;padding:1px 5px;letter-spacing:.06em}
.ebtn{background:var(--surface2);border:1px solid var(--line);color:var(--muted);width:26px;height:26px;border-radius:8px;font-size:13px;cursor:pointer;flex:none}
.addbtn{width:100%;margin-top:12px;background:transparent;border:1px dashed var(--line);color:var(--muted);border-radius:10px;padding:11px;font-size:12px;cursor:pointer;font-family:var(--mono);letter-spacing:.05em}
.sheet{position:fixed;inset:0;max-width:520px;margin:0 auto;background:var(--bg);z-index:50;transform:translateY(100%);transition:.25s;overflow-y:auto}
.sheet.show{transform:translateY(0)}
.sheethd{position:sticky;top:0;display:flex;align-items:center;justify-content:space-between;padding:calc(env(safe-area-inset-top) + 14px) 18px 14px;background:var(--surface);border-bottom:1px solid var(--line);font-size:16px}
.sheethd .x{background:0;border:0;color:var(--muted);font-size:21px;cursor:pointer}
.sheetbody{padding:16px 16px calc(env(safe-area-inset-bottom) + 28px)}
.qrow{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);margin:6px 0 14px}
.qrow input{width:18px;height:18px;accent-color:var(--accent)}
.exlbl{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:8px 0}
.exrow{background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:10px;margin-bottom:9px;display:flex;flex-direction:column;gap:7px}
.exrow input{background:var(--surface2);border:1px solid var(--line);border-radius:8px;color:var(--text);padding:9px 10px;font-size:13px;font-family:var(--sans);width:100%}
.exrow input:focus{outline:none;border-color:var(--accent)}
.exrow .r3{display:grid;grid-template-columns:1fr 1fr 38px;gap:7px}
.rmex{background:var(--surface2);border:1px solid var(--line);color:var(--danger);border-radius:8px;cursor:pointer;font-size:13px}
.addex{width:100%;background:transparent;border:1px dashed var(--line);color:var(--muted);border-radius:9px;padding:10px;cursor:pointer;font-family:var(--mono);font-size:12px;margin-bottom:16px}
.sheetfoot{display:flex;gap:10px}.sheetfoot .save{flex:1;margin:0}
.ghost{background:var(--surface2);border:1px solid var(--line);color:var(--muted);border-radius:11px;padding:14px 16px;font-size:13px;cursor:pointer}
.ghost.danger{color:var(--danger)}
</style>
</head>
<body>

  <button data-tab="train" class="on"><span class="ic">▤</span><span class="tx">Train</span></button>

</div>

function daySessions(wid,di,d){
  const out=[];
  d.sessions.forEach((s,si)=>{const key=`${wid}|${di}|${si}`; const ov=edits[key]; out.push({s:ov||s,key,edited:!!ov,custom:false});});
  (addsess[`${wid}|${di}`]||[]).forEach((s,ci)=>{out.push({s,key:`${wid}|${di}|c${ci}`,edited:false,custom:true,ci});});
  return out;
}
function train(){
  const wk=DATA.weeks[wsel];

  h+=`<div class="note">${wk.title} · ${wk.sub}  —  tap ✎ to edit or swap any session</div>`;
  wk.days.forEach((d,di)=>{
    const list=daySessions(wk.id,di,d);
    const tot=list.length; let dn=0; list.forEach(o=>{if(done[o.key])dn++});
    const oc=(window.__open===`${wsel}-${di}`)?'open':'';
    h+=`<div class="daycard ${d.rest?'rest':''} ${oc}">

    list.forEach(o=>{

      s.ex.forEach(e=>{
        h+=`<div class="ex"><span class="exn">${e[0]}</span><span class="sr">${e[1]||''}</span>`;

}

      <div class="mbody">`;
    m.items.forEach(it=>h+=`<div class="ing"><span>${it.food}</span><span class="am">${it.amt}</span></div>`);
    h+=`<div class="ing" style="color:var(--dim)"><span>P ${m.p} · F ${m.f} · C ${m.c}</span><span class="am">${m.k} kcal</span></div>`;
    h+=`</div></div>`;});
  h+=`<div class="note">Weights: meats cooked · grains/oats/rice dry · sweet potato raw. Totals ±5%. Swap like-for-like freely.</div>`;
  return h+'</div>';
}

function track(){
  const today=new Date().toISOString().slice(0,10);
  let h='<div class="wrap"><div class="card"><h2>Log today</h2>';
  h+=`<div class="field"><label>Date</label><input type="date" id="i_date" value="${today}"></div>`;
  h+=`<div class="row2"><div class="field"><label>AM weight (kg)</label><input type="number" step="0.1" inputmode="decimal" id="i_wt" placeholder="85.0"></div>
      <div class="field"><label>Sleep (h)</label><input type="number" step="0.5" inputmode="decimal" id="i_sl" placeholder="8"></div></div>`;
  h+=`<div class="row3">
      <div class="field"><label>Energy /10</label><input type="number" inputmode="numeric" id="i_en" placeholder="7"></div>
      <div class="field"><label>Legs /10</label><input type="number" inputmode="numeric" id="i_lg" placeholder="7"></div>
      <div class="field"><label>RPE /10</label><input type="number" inputmode="numeric" id="i_rpe" placeholder="6"></div></div>`;
  h+=`<div class="field"><label>How I felt / feedback</label><textarea id="i_nt" rows="2" placeholder="Legs flat off the sled, sleep great..."></textarea></div>`;
  h+=`<button class="save" onclick="saveLog()">Save entry</button></div>`;
  // chart
  const wl=log.filter(e=>e.wt).slice().sort((a,b)=>a.date<b.date?-1:1);
  h+='<div class="card"><h2>Weight trend</h2>'+chart(wl)+
     '<div class="legend"><span><i style="background:var(--accent)"></i>weight</span><span><i style="background:var(--muted)"></i>85 hold</span><span><i style="background:var(--teal)"></i>80 goal</span></div></div>';
  // history
  h+='<div class="card"><h2>History</h2>';
  if(!log.length){h+='<div class="empty">No entries yet.<br>Log your morning weight to start the trend.</div>';}
  else{h+='<div class="hist">';
    log.slice().sort((a,b)=>a.date<b.date?1:-1).forEach((e,i)=>{
      const idx=log.indexOf(e);
      h+=`<div class="hrow"><span class="hd">${e.date.slice(5)}</span>
        <span class="hw">${e.wt?e.wt+'kg':'—'}</span><button class="del" onclick="delLog(${idx})">✕</button>`;
      const bits=[]; if(e.en)bits.push('E'+e.en); if(e.lg)bits.push('Legs'+e.lg); if(e.rpe)bits.push('RPE'+e.rpe); if(e.sl)bits.push(e.sl+'h');
      if(bits.length||e.nt)h+=`<span class="hn">${bits.join(' · ')}${e.nt?(bits.length?' — ':'')+e.nt:''}</span>`;
      h+=`</div>`;});
    h+='</div>';}
  h+='</div></div>';
  return h;
}
function chart(wl){
  const W=480,H=150,pad=24;
  if(wl.length<1)return `<svg class="chart" viewBox="0 0 ${W} ${H}"><text x="${W/2}" y="${H/2}" fill="#5C6873" font-size="13" text-anchor="middle" font-family="monospace">log 2+ weigh-ins to see your trend</text></svg>`;
  const ws=wl.map(e=>+e.wt); let mn=Math.min(80,...ws)-1, mx=Math.max(85,...ws)+1;
  const x=i=>pad+(wl.length<2?(W-2*pad)/2:i*(W-2*pad)/(wl.length-1));
  const y=v=>H-pad-(v-mn)/(mx-mn)*(H-2*pad);
  const yl=v=>`<line x1="${pad}" x2="${W-pad}" y1="${y(v)}" y2="${y(v)}" stroke="${v==80?'var(--teal)':'var(--muted)'}" stroke-width="1" stroke-dasharray="3 4" opacity=".5"/>`;
  let pts=wl.map((e,i)=>`${x(i)},${y(+e.wt)}`).join(' ');
  let dots=wl.map((e,i)=>`<circle cx="${x(i)}" cy="${y(+e.wt)}" r="3.5" fill="var(--accent)"/>`).join('');
  let path=wl.length<2?`<circle cx="${x(0)}" cy="${y(ws[0])}" r="4" fill="var(--accent)"/>`:
     `<polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round"/>${dots}`;
  return `<svg class="chart" viewBox="0 0 ${W} ${H}">${yl(85)}${yl(80)}${path}
    <text x="${pad}" y="${y(mx)-4}" fill="#5C6873" font-size="10" font-family="monospace">${mx.toFixed(0)}</text>
    <text x="${pad}" y="${y(mn)+12}" fill="#5C6873" font-size="10" font-family="monospace">${mn.toFixed(0)}kg</text></svg>`;
}
function saveLog(){
  const g=id=>$('#'+id).value.trim();
  const e={date:g('i_date')||new Date().toISOString().slice(0,10),wt:g('i_wt'),sl:g('i_sl'),en:g('i_en'),lg:g('i_lg'),rpe:g('i_rpe'),nt:g('i_nt')};
  if(!e.wt&&!e.nt&&!e.en){toast('Add a weight or note first');return;}
  const ix=log.findIndex(x=>x.date===e.date); if(ix>=0)log[ix]=e; else log.push(e);
  LS.set('hx_log',log); toast('Saved ✓'); render();
}
function delLog(i){log.splice(i,1);LS.set('hx_log',log);render();}

function esc(v){return (v==null?'':(''+v)).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function exRow(e,i){return `<div class="exrow">
  <input placeholder="Exercise" value="${esc(e[0])}" oninput="cur.ex[${i}][0]=this.value">
  <div class="r3">
    <input placeholder="Sets×Reps" value="${esc(e[1])}" oninput="cur.ex[${i}][1]=this.value">
    <input placeholder="Load / pace" value="${esc(e[2])}" oninput="cur.ex[${i}][2]=this.value">
    <button class="rmex" onclick="rmEx(${i})">✕</button></div>
  <input placeholder="Note (optional)" value="${esc(e[3])}" oninput="cur.ex[${i}][3]=this.value"></div>`;}
function renderEdit(){
  let h=`<div class="sheethd"><b>${editCtx.custom?'Custom session':'Edit session'}</b><button class="x" onclick="closeEdit()">✕</button></div><div class="sheetbody">`;
  h+=`<div class="field"><label>Session name</label><input value="${esc(cur.label)}" oninput="cur.label=this.value"></div>`;
  h+=`<div class="row2"><div class="field"><label>Duration</label><input value="${esc(cur.dur)}" oninput="cur.dur=this.value"></div>
      <div class="field"><label>Type tag</label><input value="${esc(cur.tag)}" oninput="cur.tag=this.value"></div></div>`;
  h+=`<label class="qrow"><input type="checkbox" ${cur.q?'checked':''} onchange="cur.q=this.checked"> Mark as quality session</label>`;
  h+=`<div class="exlbl">Exercises</div><div id="exlist">`+cur.ex.map((e,i)=>exRow(e,i)).join('')+`</div>`;
  h+=`<button class="addex" onclick="addEx()">+ Add exercise</button>`;
  h+=`<div class="sheetfoot"><button class="save" onclick="saveEdit()">Save</button>`;
  if(editCtx.custom)h+=`<button class="ghost danger" onclick="delCustom()">Delete</button>`;
  else if(edits[editCtx.key])h+=`<button class="ghost" onclick="resetEdit()">Reset to plan</button>`;
  h+=`</div></div>`;
  let ov=document.getElementById('sheet'); if(!ov){ov=document.createElement('div');ov.id='sheet';ov.className='sheet';document.body.appendChild(ov);}
  ov.innerHTML=h; requestAnimationFrame(()=>ov.classList.add('show'));
}
function openEdit(wid,di,key){
  const sp=key.split('|')[2]; editCtx={wid,di,key};
  let base;
  if(sp[0]==='c'){const ci=+sp.slice(1); base=addsess[`${wid}|${di}`][ci]; editCtx.custom=true; editCtx.ci=ci;}
  else{const si=+sp; base=edits[key]||DATA.weeks[wsel].days[di].sessions[si]; editCtx.custom=false; editCtx.si=si;}
  cur={label:base.label||'',dur:base.dur||'',tag:base.tag||'',q:!!base.q,ex:(base.ex||[]).map(e=>[e[0]||'',e[1]||'',e[2]||'',e[3]||''])};
  if(!cur.ex.length)cur.ex.push(['','','','']);
  renderEdit();
}
function addEx(){cur.ex.push(['','','','']);document.getElementById('exlist').insertAdjacentHTML('beforeend',exRow(['','','',''],cur.ex.length-1));}
function rmEx(i){cur.ex.splice(i,1);renderEdit();}
function closeEdit(){const ov=document.getElementById('sheet');if(ov)ov.classList.remove('show');}
function saveEdit(){
  cur.ex=cur.ex.filter(e=>e[0]&&e[0].trim());
  if(!cur.label.trim()){toast('Add a session name');return;}
  if(editCtx.custom){addsess[`${editCtx.wid}|${editCtx.di}`][editCtx.ci]=cur;LS.set('hx_addsess',addsess);}
  else{edits[editCtx.key]=cur;LS.set('hx_edits',edits);}
  closeEdit();toast('Saved ✓');render();
}
function resetEdit(){delete edits[editCtx.key];LS.set('hx_edits',edits);closeEdit();toast('Reset to plan');render();}
function delCustom(){addsess[`${editCtx.wid}|${editCtx.di}`].splice(editCtx.ci,1);LS.set('hx_addsess',addsess);delete done[editCtx.key];LS.set('hx_done',done);closeEdit();toast('Deleted');render();}
function addSession(wid,di){const k=`${wid}|${di}`;if(!addsess[k])addsess[k]=[];addsess[k].push({label:'New session',dur:'',tag:'CUSTOM',q:false,ex:[['','','','']]});LS.set('hx_addsess',addsess);openEdit(wid,di,`${wid}|${di}|c${addsess[k].length-1}`);}

function render(){setHead();$('#view').innerHTML={train:train,fuel:fuel,track:track}[tab]();}
document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>{
  tab=b.dataset.tab;document.querySelectorAll('.nav button').forEach(x=>x.classList.toggle('on',x===b));
  window.__open=null;render();window.scrollTo(0,0);});
render();
</script>
<script>if('serviceWorker' in navigator){addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}))}</script>
